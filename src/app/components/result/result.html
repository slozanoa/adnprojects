<div class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-1">

  <div class="shrink-0">
    <app-grid [matrix]="matrix()" [mutantCells]="mutantCells()" />
  </div>

  <div class="flex flex-col items-center">
    @if (isMutant()) {
      <img src="ismutant.png" alt="ADN Mutante" class="w-44 h-auto object-contain drop-shadow-md" />
    } @else {
      <img src="adnsucceess.png" alt="ADN Normal" class="w-44 h-auto object-contain drop-shadow-md" />
    }
  </div>

</div>
