@if (isMutant) {
  <div class="bg-white rounded-2xl shadow-md px-5 py-3 flex items-center gap-3 border-l-4 border-red-400">
    <div class="shrink-0 w-9 h-9 rounded-full bg-red-50 flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-red-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <div>
      <p class="text-sm font-semibold text-slate-800">Mutante detectado</p>
      <p class="text-xs text-slate-400">{{ mutantCount }} células mutantes encontradas en el ADN</p>
    </div>
  </div>
} @else {
  <div class="bg-white rounded-2xl shadow-md px-5 py-3 flex items-center gap-3 border-l-4 border-emerald-400">
    <div class="shrink-0 w-9 h-9 rounded-full bg-emerald-50 flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-emerald-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <polyline points="9 12 11 14 15 10"/>
      </svg>
    </div>
    <div>
      <p class="text-sm font-semibold text-slate-800">ADN normal</p>
      <p class="text-xs text-slate-400">Sin secuencias mutantes en el ADN</p>
    </div>
  </div>
}
