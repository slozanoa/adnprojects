<div class="h-screen bg-linear-to-br from-slate-100 to-blue-50 flex flex-col overflow-hidden">

<app-header></app-header>

<div class="flex-1 flex flex-col items-center justify-center overflow-auto py-4">

  @if (!snapshot()) {
  <div class="bg-white rounded-2xl shadow-xl p-5 max-w-lg w-full">

    <div class="mb-4 text-center">
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Detector de Mutantes</h1>
    </div>

    <div class="mb-4">
      <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">
        Secuencias de ADN <span class="font-normal text-slate-400 normal-case">(solo A, T, G, C)</span>
      </p>
      <div class="space-y-1.5">
        @for (row of dna(); track $index; let i = $index) {
          <app-input
            [row]="row"
            [index]="i"
            [hasError]="rowHasError()[i]"
            [canRemove]="dna().length > 1"
            (valueChange)="updateRow(i, $event)"
            (remove)="removeRow(i)"
          />
        }
      </div>
      <button
        (click)="addRow()"
        class="mt-3 flex items-center gap-1.5 text-sm text-blue-600 hover:text-blue-800 font-medium transition-colors"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
        </svg>
        Agregar fila
      </button>
    </div>

    @if (!isValid()) {
      <div class="mb-3 rounded-lg bg-red-50 border border-red-200 p-3">
        <p class="text-sm font-semibold text-red-700 mb-1">Errores de validación</p>
        <ul class="list-disc list-inside space-y-1">
          @for (err of validationErrors(); track err) {
            <li class="text-sm text-red-600">{{ err }}</li>
          }
        </ul>
      </div>
    }

    <button
      (click)="analyze()"
      [disabled]="!isValid()"
      class="w-full py-3 rounded-xl font-semibold text-base transition-all duration-200
             bg-blue-600 text-white shadow-md shadow-blue-200
             hover:bg-blue-700 active:scale-95
             disabled:opacity-40 disabled:cursor-not-allowed disabled:shadow-none"
    >
      Analizar ADN
    </button>

  </div>
  }

  @if (snapshot(); as s) {
    <div class="w-full max-w-2xl flex flex-col gap-3">

      <app-banner [isMutant]="s.isMutant" [mutantCount]="s.mutantCells.size" />

      <div class="bg-white rounded-2xl shadow-xl p-5 w-full">
        <button
          (click)="goBack()"
          class="flex items-center gap-1.5 text-sm text-slate-500 hover:text-slate-800 font-medium mb-4 transition-colors group"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transition-transform group-hover:-translate-x-0.5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
          </svg>
          Volver
        </button>
        <app-result
          [matrix]="s.matrix"
          [mutantCells]="s.mutantCells"
          [isMutant]="s.isMutant"
        />
      </div>

    </div>
  }

</div>
